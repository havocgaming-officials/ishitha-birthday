<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ishitha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

/* LOCKSCREEN */
#lockscreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, #ffd6e0, #e6d6ff);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.lock-box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

.lock-box input {
  padding: 10px;
  margin-top: 10px;
  width: 80%;
  border-radius: 10px;
}

.lock-box button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #ff8fab;
  color: white;
  border-radius: 20px;
}

/* BODY FIXED */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom, #ffd6e0, #e6d6ff);
  overflow-x: hidden;
  scroll-behavior: smooth;
  position: relative;
}

/* soft glow overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255,255,255,0.35), transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* FLOATING HEARTS */
.hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.hearts span {
  position: absolute;
  bottom: -50px;
  color: rgba(255, 105, 135, 0.4);
  animation: floatUp 10s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
}

/* ENVELOPE */
#landing {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

.envelope {
  width: 200px;
  height: 130px;
  background: linear-gradient(135deg, #ff8fab, #ff6f91);
  position: relative;
  cursor: pointer;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  transition: transform 0.4s ease;
  animation: float 3s ease-in-out infinite;
}

.envelope:hover {
  transform: scale(1.05);
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* SECTIONS */
.section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: translateY(60px) scale(0.98);
  transition: 1s cubic-bezier(.2,.8,.2,1);
  padding: 30px;
  position: relative;
  z-index: 1;
}

/* glowing pulse */
.section::before {
  content: "";
  position: absolute;
  width: 320px;
  height: 320px;
  background: radial-gradient(circle, rgba(255,255,255,0.5), transparent 70%);
  filter: blur(50px);
  opacity: 0.5;
  animation: pulseGlow 6s ease-in-out infinite;
}

@keyframes pulseGlow {
  0%, 100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.2); opacity: 0.7; }
}

.section.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* IMAGE CINEMATIC ZOOM */
img {
  width: 90%;
  max-width: 520px;
  border-radius: 24px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
  transform: scale(1.05);
  transition: transform 2s ease, box-shadow 0.6s ease;
  filter: saturate(1.1) contrast(1.05);
  position: relative;
  z-index: 2;
}

.section.show img {
  transform: scale(1);
}

img:hover {
  transform: scale(1.03);
  box-shadow: 0 25px 60px rgba(0,0,0,0.35);
}

/* CAPTION DEPTH */
.caption {
  margin-top: 18px;
  text-align: center;
  font-size: 18px;
  color: rgba(0,0,0,0.7);
  max-width: 80%;
  line-height: 1.4;
  font-weight: 500;
  backdrop-filter: blur(2px);
  background: rgba(255,255,255,0.2);
  padding: 10px 15px;
  border-radius: 12px;
  position: relative;
  z-index: 2;
}

/* LETTER */
#letter {
  backdrop-filter: blur(10px);
  position: relative;
  z-index: 1;
}

.letter-box {
  background: rgba(255,255,255,0.7);
  padding: 25px;
  border-radius: 20px;
  max-width: 90%;
  line-height: 1.7;
}

/* FINAL */
#final {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  text-align: center;
  position: relative;
  z-index: 1;
}

</style>
</head>

<body>

<!-- HEARTS -->
<div class="hearts"></div>

<!-- LOCK -->
<div id="lockscreen">
  <div class="lock-box">
    <h2>Enter Password 💌</h2>
    <input type="password" id="passwordInput">
    <button onclick="unlock()">Unlock</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- ENVELOPE -->
<div id="landing">
  <h1>For Ishitha ❤️</h1>
  <div class="envelope" onclick="start()"></div>
  <p>Tap to open</p>
</div>

<!-- MUSIC -->
<iframe id="music" width="0" height="0"
src="https://www.youtube.com/embed/rCoPr8UwRMc?enablejsapi=1"
frameborder="0"></iframe>

<!-- STORY -->
<div id="story"></div>

<!-- LETTER -->
<div id="letter" class="section">
  <div class="letter-box">
    <p id="typedText"></p>
  </div>
</div>

<!-- FINAL -->
<div id="final" class="section">
  <p>
    Happy Birthday, Ishitha ❤️<br><br>
    Forever yours,<br>
    ~ Your Loving Husband
  </p>
</div>

<script>

/* HEARTS */
function createHearts(){
  const hearts = document.querySelector(".hearts");

  for(let i=0;i<25;i++){
    const span = document.createElement("span");
    span.innerHTML = "❤️";
    span.style.left = Math.random()*100 + "vw";
    span.style.animationDuration = (6 + Math.random()*6) + "s";
    span.style.fontSize = (12 + Math.random()*20) + "px";
    hearts.appendChild(span);
  }
}
createHearts();

/* ORIGINAL LOGIC (UNCHANGED BELOW) */

const captions = [
"Where it all started… ❤️",
"A beginning we didn’t understand yet",
"Slowly… you became important",
"Somewhere here… it became real ❤️",
"You became my comfort",
"Moments I never want to lose",
"You became my peace",
"This is where I knew ❤️",
"You’re my forever",
"Every moment with you matters",
"You and me against everything",
"Still choosing you",
"Even unreal moments feel real ❤️",
"Our forever starts here"
];

const story = document.getElementById("story");

let started = false;
let index = 0;
let musicStarted = false;
let autoMode = true;

/* BUILD STORY */
for(let i=1;i<=14;i++){
  const div = document.createElement("div");
  div.className = "section";

  div.innerHTML = `
    <img src="img${i}.jpg">
    <div class="caption">${captions[i-1]}</div>
  `;

  story.appendChild(div);
}

function start(){
  document.getElementById("landing").style.display = "none";
  started = true;
  reveal();
}

/* MUSIC */
function playMusicOnce(){
  if(!musicStarted){
    document.getElementById("music").src += "&autoplay=1&loop=1&playlist=rCoPr8UwRMc";
    musicStarted = true;
  }
}

/* REVEAL */
function revealNext(){
  const sections = document.querySelectorAll(".section");

  if(index >= sections.length){
    startLetter();
    return;
  }

  sections[index].classList.add("show");

  if(index === 0){
    playMusicOnce();
  }

  index++;
}

document.addEventListener("click", () => {
  if(started){
    revealNext();
  }
});

/* LETTER */
const message = `...your full message unchanged...`;

let i = 0;
function typeLetter(){
  if(i < message.length){
    document.getElementById("typedText").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeLetter, 18);
  }
}

window.addEventListener("scroll", () => {
  const letter = document.getElementById("letter");
  if(letter.getBoundingClientRect().top < window.innerHeight - 100 && i===0){
    typeLetter();
  }
});

/* PASSWORD */
function unlock(){
  if(document.getElementById("passwordInput").value === "180110"){
    document.getElementById("lockscreen").style.display = "none";
  } else {
    document.getElementById("error").innerText = "Wrong password ❤️";
  }
}

</script>

</body>
</html>
