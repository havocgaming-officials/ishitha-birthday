<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Ishitha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #e6d6ff);
  overflow: hidden;
}

/* 🔒 LOCK */
#lockscreen, #tapScreen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: radial-gradient(circle, #ffd6e0, #e6d6ff);
  z-index: 9999;
  text-align: center;
}

.box {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
}

/* 🎬 TAP SCREEN */
#tapScreen {
  display: none;
}

/* 🖼 STORY */
#storyContainer {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

.imageBox {
  width: 90%;
  max-width: 520px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
  opacity: 0;
  transform: scale(0.95);
  transition: all 1s ease;
}

.imageBox.show {
  opacity: 1;
  transform: scale(1);
}

.imageBox img {
  width: 100%;
  display: block;
}

.caption {
  margin-top: 20px;
  font-size: 18px;
  opacity: 0;
  transition: 1s ease;
}

.caption.show {
  opacity: 1;
}

/* 💌 LETTER */
#letter {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  padding: 30px;
  text-align: center;
}

.letterBox {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  padding: 35px;
  border-radius: 20px;
  max-width: 700px;
  line-height: 1.8;
}

</style>
</head>

<body>

<!-- 🔒 PASSWORD -->
<div id="lockscreen">
  <div class="box">
    <h2>Enter Password 💌</h2>
    <input type="password" id="pass">
    <br><br>
    <button onclick="unlock()">Unlock</button>
    <p id="err"></p>
  </div>
</div>

<!-- 💌 TAP SCREEN -->
<div id="tapScreen">
  <div class="box">
    <h2>Tap to Open 💖</h2>
    <button onclick="startExperience()">Open</button>
  </div>
</div>

<!-- 🎬 STORY -->
<div id="storyContainer">
  <div class="imageBox" id="imgBox">
    <img id="img" src="">
  </div>
  <div class="caption" id="caption"></div>
</div>

<!-- 💌 LETTER -->
<div id="letter">
  <div class="letterBox">
    <p id="typedText"></p>
  </div>
</div>

<!-- 🎵 MUSIC -->
<iframe id="music" width="0" height="0"
src="https://www.youtube.com/embed/rCoPr8UwRMc"
frameborder="0"></iframe>

<script>

const images = [];
const captions = [
"Where it all started… ❤️",
"A beginning we didn’t understand yet",
"Slowly… you became important",
"Somewhere here… it became real ❤️",
"You became my comfort",
"Moments I never want to lose",
"You became my peace",
"This is where I knew ❤️",
"You’re my forever",
"Every moment with you matters",
"You and me against everything",
"Still choosing you",
"Even unreal moments feel real ❤️",
"Our forever starts here"
];

for(let i=1;i<=14;i++){
  images.push(`img${i}.jpg`);
}

/* 🔐 PASSWORD */
function unlock(){
  const p = document.getElementById("pass").value;
  if(p === "180110"){
    document.getElementById("lockscreen").style.display = "none";
    document.getElementById("tapScreen").style.display = "flex";
  } else {
    document.getElementById("err").innerText = "Wrong password ❤️";
  }
}

/* 💌 START */
function startExperience(){

  document.getElementById("tapScreen").style.display = "none";

  // 🎵 start music immediately
  document.getElementById("music").src += "&autoplay=1&loop=1&playlist=rCoPr8UwRMc";

  let i = 0;

  function showNext(){

    if(i >= images.length){
      startLetter();
      return;
    }

    const imgBox = document.getElementById("imgBox");
    const img = document.getElementById("img");
    const caption = document.getElementById("caption");

    img.src = images[i];
    caption.innerText = captions[i];

    imgBox.classList.add("show");
    caption.classList.add("show");

    i++;

    setTimeout(()=>{
      imgBox.classList.remove("show");
      caption.classList.remove("show");
      setTimeout(showNext, 800);
    }, 5000);
  }

  showNext();
}

/* 💌 LETTER */
const message = `YOUR FULL LETTER HERE`;

function startLetter(){
  document.getElementById("storyContainer").style.display = "none";
  document.getElementById("letter").style.display = "flex";

  let i = 0;

  function type(){
    if(i < message.length){
      document.getElementById("typedText").innerHTML += message[i];
      i++;
      setTimeout(type, 15);
    }
  }

  type();
}

</script>

</body>
</html>
