<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Ishitha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

/* 🌌 Base */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #ffe4ec, #e6d6ff 70%);
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* subtle grain */
body::after {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
  background-size: 50px 50px;
  opacity: 0.15;
  animation: moveBg 30s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  from { transform: translate(0,0); }
  to { transform: translate(-200px,-200px); }
}

/* 🔒 Lock */
#lockscreen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #ffd6e0, #e6d6ff);
  z-index: 999;
}

.lock-box {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  padding: 35px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

.lock-box input {
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  width: 80%;
}

.lock-box button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg,#ff8fab,#ff5d8f);
  color: white;
}

/* 🎬 Landing */
#landing {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: opacity .6s ease;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  margin-bottom: 30px;
}

/* ✉️ Envelope */
.envelope {
  width: 220px;
  height: 140px;
  background: linear-gradient(145deg,#ff8fab,#ffc2d1);
  border-radius: 14px;
  position: relative;
  cursor: pointer;
  box-shadow: 0 25px 60px rgba(0,0,0,0.2);
  animation: float 4s ease-in-out infinite;
  transition: transform .4s ease;
}

.envelope:hover {
  transform: scale(1.05);
}

.envelope::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ffd6e0;
  clip-path: polygon(0 0, 50% 60%, 100% 0);
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* 🎵 Button */
#musicBtn {
  margin-top: 20px;
  padding: 12px 28px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg,#ff8fab,#ff5d8f);
  color: white;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(255,105,135,0.5);
  transition: .3s;
}

#musicBtn:hover {
  transform: translateY(-3px);
}

/* 📖 Sections */
.section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: translateY(80px);
  transition: all 1.2s cubic-bezier(.22,1,.36,1);
  padding: 30px;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* 🖼 Images */
img {
  width: 90%;
  max-width: 520px;
  border-radius: 20px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
  transition: transform 2s ease;
}

.section.show img {
  transform: scale(1.08);
}

/* ❤️ Caption */
.caption {
  margin-top: 25px;
  font-size: 20px;
  max-width: 600px;
  text-align: center;
  color: #333;
}

/* 💌 Letter */
#letter {
  backdrop-filter: blur(20px);
}

.letter-box {
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(25px);
  padding: 40px;
  border-radius: 20px;
  max-width: 700px;
  line-height: 1.9;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

/* typing cursor */
#typedText::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ❤️ Final */
#final {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  text-align: center;
  padding-bottom: 120px;
}

</style>
</head>

<body>

<div id="lockscreen">
  <div class="lock-box">
    <h2>Enter Password 💌</h2>
    <input type="password" id="passwordInput">
    <button onclick="unlock()">Unlock</button>
    <p id="error"></p>
  </div>
</div>

<div id="landing">
  <h1>For Ishitha ❤️</h1>
  <div class="envelope" onclick="start()"></div>
  <p>Tap to open</p>
  <button id="musicBtn" onclick="playMusic()">Play Our Song 🎶</button>
</div>

<iframe id="music" width="0" height="0"
src="https://www.youtube.com/embed/rCoPr8UwRMc?enablejsapi=1"
frameborder="0"></iframe>

<div id="story"></div>

<div id="letter" class="section">
  <div class="letter-box">
    <p id="typedText"></p>
  </div>
</div>

<div id="final" class="section">
  <p>
    Happy Birthday, Ishitha ❤️<br><br>
    Forever yours,<br>
    ~ Your Loving Husband
  </p>
</div>

<script>

const captions = [
"Where it all started… ❤️",
"A beginning we didn’t understand yet",
"Slowly… you became important",
"Somewhere here… it became real ❤️",
"You became my comfort",
"Moments I never want to lose",
"You became my peace",
"This is where I knew ❤️",
"You’re my forever",
"Every moment with you matters",
"You and me against everything",
"Still choosing you",
"Even unreal moments feel real ❤️",
"Our forever starts here"
];

const story = document.getElementById("story");

for(let i=1;i<=14;i++){
  const div = document.createElement("div");
  div.className = "section";
  div.innerHTML = `
    <img src="img${i}.jpg">
    <div class="caption">${captions[i-1]}</div>
  `;
  story.appendChild(div);
}

function start(){
  const land = document.getElementById("landing");
  land.style.opacity = "0";
  setTimeout(()=> land.style.display="none",600);
}

function playMusic(){
  document.getElementById("music").src += "&autoplay=1&loop=1&playlist=rCoPr8UwRMc";
}

function reveal(){
  document.querySelectorAll(".section").forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight-100){
      sec.classList.add("show");
    }
  });
}
window.addEventListener("scroll", reveal);

const message = `Happy 20th Birthday, my love ❤️

You are my peace, my strength, my home.

No matter where life takes us,
I will always choose you.

Forever yours.`;

let i = 0;
function typeLetter(){
  if(i < message.length){
    document.getElementById("typedText").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeLetter, 20);
  }
}

window.addEventListener("scroll", ()=>{
  const letter = document.getElementById("letter");
  if(letter.getBoundingClientRect().top < window.innerHeight-100 && i===0){
    typeLetter();
  }
});

const correctPassword = "180110";

function unlock(){
  const input = document.getElementById("passwordInput").value;
  if(input === correctPassword){
    document.getElementById("lockscreen").style.display = "none";
  } else {
    document.getElementById("error").innerText = "Wrong password ❤️";
  }
}

</script>

</body>
</html>
