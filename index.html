<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Ishitha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

/* 🌸 Background */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #e6d6ff);
  overflow-x: hidden;
}

/* 🔒 Lock Screen */
#lockscreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, #ffd6e0, #e6d6ff);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.lock-box {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

.lock-box input {
  padding: 10px;
  margin-top: 10px;
  width: 80%;
  border-radius: 10px;
  border: none;
}

.lock-box button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #ff8fab;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}

/* 🎬 Landing */
#landing {
  height: 100vh;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.envelope {
  width: 200px;
  height: 130px;
  background: #ff8fab;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  animation: float 3s ease-in-out infinite;
}

.envelope::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ffb3c6;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 🎵 Music button */
#musicBtn {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #ff8fab;
  color: white;
  cursor: pointer;
}

/* 📖 Sections (hidden initially) */
.section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: translateY(60px);
  transition: all 1s ease;
  padding: 20px;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* 🖼 FIXED IMAGE WRAPPER (IMPORTANT FIX) */
.img-box {
  width: 90%;
  max-width: 500px;
  overflow: hidden;
  border-radius: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

.img-box img {
  width: 100%;
  display: block;
  transition: transform 1.5s ease;
}

.section.show .img-box img {
  transform: scale(1.1);
}

/* ❤️ Caption (NO OVERLAP FIX) */
.caption {
  margin-top: 20px;
  font-size: 18px;
  text-align: center;
  max-width: 90%;
}

/* 💌 Letter */
#letter {
  backdrop-filter: blur(10px);
}

.letter-box {
  background: rgba(255,255,255,0.7);
  padding: 25px;
  border-radius: 20px;
  max-width: 90%;
  line-height: 1.7;
}

/* ❤️ Final */
#final {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  text-align: center;
}

</style>
</head>

<body>

<!-- 🔒 LOCK -->
<div id="lockscreen">
  <div class="lock-box">
    <h2>Enter Password 💌</h2>
    <input type="password" id="passwordInput">
    <button onclick="unlock()">Unlock</button>
    <p id="error"></p>
  </div>
</div>

<!-- 🎬 LANDING -->
<div id="landing">
  <h1>For Ishitha ❤️</h1>
  <div class="envelope" onclick="start()"></div>
  <p>Tap to open</p>

  <button id="musicBtn" onclick="playMusic()">Play Our Song 🎶</button>
</div>

<!-- 🎵 MUSIC -->
<iframe id="music" width="0" height="0"
src="https://www.youtube.com/embed/rCoPr8UwRMc?enablejsapi=1"
frameborder="0"></iframe>

<!-- STORY -->
<div id="story"></div>

<!-- 💌 LETTER -->
<div id="letter" class="section">
  <div class="letter-box">
    <p id="typedText"></p>
  </div>
</div>

<!-- ❤️ FINAL -->
<div id="final" class="section">
  <p>
    Happy Birthday, Ishitha ❤️<br><br>
    Forever yours,<br>
    ~ Your Loving Husband
  </p>
</div>

<script>

const captions = [
"Where it all started… ❤️",
"A beginning we didn’t understand yet",
"Slowly… you became important",
"Somewhere here… it became real ❤️",
"You became my comfort",
"Moments I never want to lose",
"You became my peace",
"This is where I knew ❤️",
"You’re my forever",
"Every moment with you matters",
"You and me against everything",
"Still choosing you",
"Even unreal moments feel real ❤️",
"Our forever starts here"
];

const story = document.getElementById("story");

let started = false;

/* ❗ IMPORTANT: images are NOT visible until start() */
for(let i=1;i<=14;i++){

  const div = document.createElement("div");
  div.className = "section";

  div.innerHTML = `
    <div class="img-box">
      <img src="img${i}.jpg">
    </div>
    <div class="caption">${captions[i-1]}</div>
  `;

  story.appendChild(div);
}

/* 🎬 START ONLY ON ENVELOPE CLICK */
function start(){
  if(started) return;
  started = true;

  document.getElementById("landing").style.display = "none";

  reveal();
}

/* scroll reveal */
function reveal(){
  document.querySelectorAll(".section").forEach(sec=>{
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add("show");
    }
  });
}

window.addEventListener("scroll", reveal);

/* 🎵 MUSIC FIXED */
function playMusic(){
  document.getElementById("music").src += "&autoplay=1&loop=1&playlist=rCoPr8UwRMc";
}

/* 💌 FULL LETTER (UNCHANGED - KEEP YOUR ORIGINAL HERE) */
const message = `YOUR FULL LETTER HERE`;

let i = 0;
function typeLetter(){
  if(i < message.length){
    document.getElementById("typedText").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeLetter, 18);
  }
}

window.addEventListener("scroll", ()=>{
  const letter = document.getElementById("letter");
  if(letter.getBoundingClientRect().top < window.innerHeight - 100 && i===0){
    typeLetter();
  }
});

/* 🔐 PASSWORD */
const correctPassword = "180110";

function unlock(){
  const input = document.getElementById("passwordInput").value;

  if(input === correctPassword){
    document.getElementById("lockscreen").style.display = "none";
    document.getElementById("landing").style.display = "flex";
  } else {
    document.getElementById("error").innerText = "Wrong password ❤️";
  }
}

</script>

</body>
</html>
