<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ishitha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

/* LOCKSCREEN */
#lockscreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, #ffd6e0, #e6d6ff);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.lock-box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

.lock-box input {
  padding: 10px;
  margin-top: 10px;
  width: 80%;
  border-radius: 10px;
}

.lock-box button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #ff8fab;
  color: white;
  border-radius: 20px;
}

/* BODY */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom, #ffd6e0, #e6d6ff);
  overflow-x: hidden;
}

/* ENVELOPE */
#landing {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.envelope {
  width: 200px;
  height: 130px;
  background: #ff8fab;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
}

.envelope::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ffb3c6;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  top: 0;
}

/* SECTIONS */
.section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: translateY(60px);
  transition: 1s ease;
  padding: 20px;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

img {
  width: 90%;
  max-width: 500px;
  border-radius: 20px;
}

.caption {
  margin-top: 20px;
  text-align: center;
  font-size: 18px;
}

/* LETTER */
#letter {
  backdrop-filter: blur(10px);
}

.letter-box {
  background: rgba(255,255,255,0.7);
  padding: 25px;
  border-radius: 20px;
  max-width: 90%;
  line-height: 1.7;
}

</style>
</head>

<body>

<!-- LOCK -->
<div id="lockscreen">
  <div class="lock-box">
    <h2>Enter Password 💌</h2>
    <input type="password" id="passwordInput">
    <button onclick="unlock()">Unlock</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- ENVELOPE -->
<div id="landing">
  <h1>For Ishitha ❤️</h1>
  <div class="envelope" onclick="start()"></div>
  <p>Tap to open</p>
</div>

<!-- MUSIC -->
<iframe id="music" width="0" height="0"
src="https://www.youtube.com/embed/rCoPr8UwRMc?enablejsapi=1"
frameborder="0"></iframe>

<!-- STORY -->
<div id="story"></div>

<!-- LETTER (FIXED) -->
<div id="letter" class="section">
  <div class="letter-box">
    <p id="typedText"></p>
  </div>
</div>

<!-- FINAL -->
<div id="final" class="section">
  <p>
    Happy Birthday, Ishitha ❤️<br><br>
    Forever yours,<br>
    ~ Your Loving Husband
  </p>
</div>

<script>

const captions = [
"Where it all started… ❤️",
"A beginning we didn’t understand yet",
"Slowly… you became important",
"Somewhere here… it became real ❤️",
"You became my comfort",
"Moments I never want to lose",
"You became my peace",
"This is where I knew ❤️",
"You’re my forever",
"Every moment with you matters",
"You and me against everything",
"Still choosing you",
"Even unreal moments feel real ❤️",
"Our forever starts here"
];

const story = document.getElementById("story");

let started = false;
let index = 0;
let musicStarted = false;
let autoMode = true;
let timer = null;

/* BUILD STORY */
for(let i=1;i<=14;i++){
  const div = document.createElement("div");
  div.className = "section";

  div.innerHTML = `
    <img src="img${i}.jpg">
    <div class="caption">${captions[i-1]}</div>
  `;

  story.appendChild(div);
}

/* START */
function start(){
  document.getElementById("landing").style.display = "none";
  started = true;

  reveal();
  startAuto();
}

/* MUSIC */
function playMusicOnce(){
  if(!musicStarted){
    document.getElementById("music").src += "&autoplay=1&loop=1&playlist=rCoPr8UwRMc";
    musicStarted = true;
  }
}

/* REVEAL */
function revealNext(){
  const sections = document.querySelectorAll(".section");

  if(index >= sections.length){
    startLetter();
    return;
  }

  sections[index].classList.add("show");

  if(index === 0){
    playMusicOnce();
  }

  index++;
}

/* AUTO */
function startAuto(){
  timer = setInterval(() => {
    if(autoMode){
      revealNext();
    }
  }, 5000);
}

/* TAP */
document.addEventListener("click", () => {
  if(started){
    revealNext();
  }
});

/* SCROLL */
function reveal(){
  if(!started) return;

  document.querySelectorAll(".section").forEach(sec => {
    if(sec.getBoundingClientRect().top < window.innerHeight - 100){
      sec.classList.add("show");
    }
  });
}

window.addEventListener("scroll", reveal);

/* LETTER FIXED */
function startLetter(){
  document.getElementById("letter").classList.add("show");

  let message = `YOUR LETTER HERE`;

  let i = 0;
  document.getElementById("typedText").innerHTML = "";

  function type(){
    if(i < message.length){
      document.getElementById("typedText").innerHTML += message.charAt(i);
      i++;
      setTimeout(type, 18);
    } else {
      document.getElementById("final").classList.add("show");
    }
  }

  type();
}

/* PASSWORD */
function unlock(){
  if(document.getElementById("passwordInput").value === "180110"){
    document.getElementById("lockscreen").style.display = "none";
  } else {
    document.getElementById("error").innerText = "Wrong password ❤️";
  }
}

</script>

</body>
</html>
