<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ishitha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

/* LOCKSCREEN */
#lockscreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(to bottom, #ffd6e0, #e6d6ff);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.lock-box {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
}

/* BODY FIXED */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom, #ffd6e0, #e6d6ff);
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* HEARTS BACKGROUND ONLY */
.hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.hearts span {
  position: absolute;
  bottom: -50px;
  color: rgba(255, 80, 120, 0.7);
  animation: floatUp 10s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(-110vh); opacity: 0; }
}

/* ENVELOPE CENTERED & REALISTIC */
#landing {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.envelope {
  width: 220px;
  height: 140px;
  background: linear-gradient(145deg, #ff6f91, #ff8fab);
  position: relative;
  border-radius: 10px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  cursor: pointer;
  transform: perspective(600px) rotateX(10deg);
}

/* flap */
.envelope::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 0;
  border-left: 110px solid transparent;
  border-right: 110px solid transparent;
  border-top: 70px solid #ffb3c6;
}

/* SECTIONS */
.section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: translateY(60px);
  transition: 1s ease;
  padding: 30px;
  position: relative;
  z-index: 2;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* IMAGE */
img {
  width: 90%;
  max-width: 520px;
  border-radius: 24px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
  transform: scale(1.05);
  transition: 2s ease;
}

.section.show img {
  transform: scale(1);
}

/* CAPTION */
.caption {
  margin-top: 15px;
  text-align: center;
  font-size: 18px;
  color: rgba(0,0,0,0.7);
}

/* LETTER */
#letter {
  position: relative;
  z-index: 2;
}

.letter-box {
  background: rgba(255,255,255,0.9);
  padding: 25px;
  border-radius: 20px;
  max-width: 90%;
  line-height: 1.7;
}

/* FINAL */
#final {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  text-align: center;
}

</style>
</head>

<body>

<div class="hearts"></div>

<!-- LOCK -->
<div id="lockscreen">
  <div class="lock-box">
    <h2>Enter Password 💌</h2>
    <input type="password" id="passwordInput">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- ENVELOPE -->
<div id="landing">
  <div class="envelope" onclick="start()"></div>
  <p>Tap the envelope 💌</p>
</div>

<!-- MUSIC (Waalian) -->
<iframe id="music" width="0" height="0"
src="https://www.youtube.com/embed/rCoPr8UwRMc?enablejsapi=1"
frameborder="0"></iframe>

<!-- STORY -->
<div id="story"></div>

<!-- LETTER -->
<div id="letter" class="section">
  <div class="letter-box">
    <p id="typedText"></p>
  </div>
</div>

<!-- FINAL -->
<div id="final" class="section">
  <p>
    Happy Birthday Ishitha ❤️<br><br>
    Forever yours<br>
    ~ Your person
  </p>
</div>

<script>

/* HEARTS */
function createHearts(){
  const h = document.querySelector(".hearts");
  for(let i=0;i<25;i++){
    const s=document.createElement("span");
    s.innerHTML="❤️";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(6+Math.random()*6)+"s";
    h.appendChild(s);
  }
}
createHearts();

/* STORY */
const captions=[
"Where it all started… ❤️",
"A beginning we didn’t understand yet",
"Slowly… you became important",
"Somewhere here… it became real ❤️",
"You became my comfort",
"Moments I never want to lose",
"You became my peace",
"This is where I knew ❤️",
"You’re my forever",
"Every moment with you matters",
"You and me against everything",
"Still choosing you",
"Even unreal moments feel real ❤️",
"Our forever starts here"
];

const story=document.getElementById("story");

for(let i=1;i<=14;i++){
  const d=document.createElement("div");
  d.className="section";
  d.innerHTML=`<img src="img${i}.jpg"><div class="caption">${captions[i-1]}</div>`;
  story.appendChild(d);
}

let musicStarted=false;

/* START */
function start(){
  document.getElementById("lockscreen").style.display="none";

  // start music immediately after password
  const music=document.getElementById("music");
  music.src+="&autoplay=1&loop=1&playlist=rCoPr8UwRMc";

  startFlow();
}

/* FLOW */
function startFlow(){
  const sec=document.querySelectorAll(".section");
  let i=0;

  function next(){
    if(i>=sec.length-2){
      startLetter();
      return;
    }

    sec[i].classList.add("show");
    sec[i].scrollIntoView({behavior:"smooth",block:"center"});

    i++;
    setTimeout(next,5000);
  }

  next();
}

/* LETTER */
const msg=`YOUR FULL MESSAGE HERE`;

let i=0;

function typeLetter(){
  if(i<msg.length){
    document.getElementById("typedText").innerHTML+=msg[i++];
    setTimeout(typeLetter,18);
  } else {
    setTimeout(()=>{
      document.getElementById("final").classList.add("show");
      document.getElementById("final").scrollIntoView({behavior:"smooth"});
    },1000);
  }
}

function startLetter(){
  document.getElementById("letter").classList.add("show");
  typeLetter();
}

/* PASSWORD */
function unlock(){
  if(document.getElementById("passwordInput").value==="180110"){
    document.getElementById("lockscreen").style.display="none";
  }
}

</script>

</body>
</html>
