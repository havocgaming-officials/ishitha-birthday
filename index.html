<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Ishitha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>

/* 🌌 Base */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #ffe4ec, #e6d6ff 70%);
  overflow-x: hidden;
}

/* 🔒 Lock */
#lockscreen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #ffd6e0, #e6d6ff);
  z-index: 999;
}

.lock-box {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(20px);
  padding: 35px;
  border-radius: 20px;
}

/* 🎬 Landing */
#landing {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: opacity .6s ease;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
}

/* ✉️ Envelope */
.envelope {
  width: 220px;
  height: 140px;
  background: linear-gradient(145deg,#ff8fab,#ffc2d1);
  border-radius: 14px;
  cursor: pointer;
  margin: 20px 0;
}

/* 📖 Sections */
.section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
}

/* 🖼 FIXED IMAGE CONTAINER */
.image-wrap {
  width: 90%;
  max-width: 520px;
  overflow: hidden; /* 🔥 prevents caption overlap issue */
  border-radius: 20px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
}

.image-wrap img {
  width: 100%;
  display: block;
  transform: scale(1);
}

/* ❤️ Caption */
.caption {
  margin-top: 25px;
  font-size: 20px;
  max-width: 600px;
  text-align: center;
  opacity: 0;
}

/* 💌 Letter */
.letter-box {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(25px);
  padding: 40px;
  border-radius: 20px;
  max-width: 700px;
  line-height: 1.9;
}

/* ❤️ Final */
#final {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  text-align: center;
  padding-bottom: 120px;
}

</style>
</head>

<body>

<div id="lockscreen">
  <div class="lock-box">
    <h2>Enter Password 💌</h2>
    <input type="password" id="passwordInput">
    <button onclick="unlock()">Unlock</button>
    <p id="error"></p>
  </div>
</div>

<div id="landing">
  <h1>For Ishitha ❤️</h1>
  <div class="envelope" onclick="start()"></div>
  <p>Tap to open</p>
</div>

<div id="story"></div>

<div id="letter" class="section">
  <div class="letter-box">
    <p id="typedText"></p>
  </div>
</div>

<div id="final" class="section">
  <p>Happy Birthday, Ishitha ❤️<br><br>Forever yours,<br>~ Your Loving Husband</p>
</div>

<script>

gsap.registerPlugin(ScrollTrigger);

/* captions */
const captions = [
"Where it all started… ❤️",
"A beginning we didn’t understand yet",
"Slowly… you became important",
"Somewhere here… it became real ❤️",
"You became my comfort",
"Moments I never want to lose",
"You became my peace",
"This is where I knew ❤️",
"You’re my forever",
"Every moment with you matters",
"You and me against everything",
"Still choosing you",
"Even unreal moments feel real ❤️",
"Our forever starts here"
];

const story = document.getElementById("story");

/* build sections */
for(let i=1;i<=14;i++){
  const div = document.createElement("div");
  div.className = "section";

  div.innerHTML = `
    <div class="image-wrap">
      <img src="img${i}.jpg">
    </div>
    <div class="caption">${captions[i-1]}</div>
  `;

  story.appendChild(div);
}

/* 🎬 GSAP animations */
document.querySelectorAll(".section").forEach(sec => {
  const img = sec.querySelector("img");
  const caption = sec.querySelector(".caption");

  gsap.fromTo(img,
    { scale: 1.2 },
    {
      scale: 1,
      scrollTrigger: {
        trigger: sec,
        start: "top 80%",
        end: "bottom 20%",
        scrub: true
      }
    }
  );

  gsap.to(caption, {
    opacity: 1,
    y: -10,
    duration: 1,
    scrollTrigger: {
      trigger: sec,
      start: "top 75%"
    }
  });
});

/* start */
function start(){
  const land = document.getElementById("landing");
  land.style.opacity = "0";
  setTimeout(()=> land.style.display="none",600);
}

/* 🔐 lock */
const correctPassword = "180110";

function unlock(){
  const input = document.getElementById("passwordInput").value;
  if(input === correctPassword){
    document.getElementById("lockscreen").style.display = "none";
  } else {
    document.getElementById("error").innerText = "Wrong password ❤️";
  }
}

/* 💌 FULL LETTER (UNCHANGED) */
const message = `Happy 20th Birthday, my love ❤️
Another year, another chapter… and somehow, every time I sit to write for you, it feels like words still fall short. But today, I’ll try again—because you deserve to hear it, again and again.
It still feels like yesterday—grade eight, that moment when you walked into the class… and unknowingly walked straight into my heart. That one “May I come in, ma’am?” still echoes somewhere inside me. I didn’t realize then that this simple moment would turn into a story so deep, so real, and so ours.
From being those two innocent kids stealing glances, to becoming “us” after class nine… we’ve lived through everything—distance, silence, misunderstandings, pain, and yet, somehow, love always found its way back stronger. People say love fades with time, but what we have… it grew through every storm we faced.
We were never perfect—but maybe that’s what made us real. When distance came, we learned how to feel without seeing. When silence came, our eyes spoke louder than words ever could. When things broke, we didn’t leave—we held on tighter. And that’s what makes us different.
You’ve been so many things in my life—my girl, my peace, my strength. Sometimes you cared for me like no one else ever could, like I had a home in you. And somewhere along the way, that little girl from grade eight became my whole world.
I know the journey hasn’t been easy for you. I’ve seen your pain, your struggles, the silent battles you’ve fought. And still, you stayed. Still, you loved. Still, you held my hand when it wasn’t easy. That strength of yours… I respect it more than I can ever express.
This year, I don’t want you to carry any of the old pain with you. Let it go. Burn every memory that hurt you. You deserve a life that feels light, peaceful, and full of happiness. You deserve to smile without a reason, to live without fear, to love without holding back.
I may not always be able to give you everything, not gifts, not grand things… but I promise you this—I’ll always give you my heart, my loyalty, and my presence. And I’ll keep proving, every day, that your trust in me was never wrong.
“पानी में पत्थर मत फेंका करो, उसे भी कोई पीता है… मरने की बात मत किया करो, तुम्हें देख कर भी कोई जीता है…”
You are that reason someone lives. You are my reason.
Happy Birthday, Ishitha. Happy 20th, my love ❤️ Live it fully, smile endlessly, and never forget—you matter, to me more than anything in this world.
Forever yours, ~ Your Loving Husband`;

let i = 0;
function typeLetter(){
  if(i < message.length){
    document.getElementById("typedText").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeLetter, 18);
  }
}

ScrollTrigger.create({
  trigger: "#letter",
  start: "top 70%",
  onEnter: typeLetter
});

</script>

</body>
</html>
